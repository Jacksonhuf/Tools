openapi: 3.0.3
info:
  title: MX Pricing BFF API
  version: 0.1.0
  description: Mercado Libre + Amazon MX cross-border pricing (SDD §10)
servers:
  - url: http://localhost:3000
paths:
  /api/v1/skus:
    get:
      summary: List SKUs (P0-E2-01)
      responses:
        "200":
          description: SKU list
  /api/v1/skus/export:
    get:
      summary: Download tenant SKU catalog as CSV
  /api/v1/skus/{skuId}:
    patch:
      summary: Update SKU landed cost
      parameters:
        - name: skuId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                landed_cost_mxn:
                  type: number
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /api/v1/skus/{skuId}/pricing-context:
    get:
      summary: Pricing context (SDD §10.1)
      parameters:
        - name: skuId
          in: path
          required: true
          schema:
            type: string
        - name: channel
          in: query
          schema:
            type: string
            enum: [MERCADO_LIBRE, AMAZON_MX]
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Tenant-Id
          in: header
          schema:
            type: string
        - name: Accept-Language
          in: header
          schema:
            type: string
      responses:
        "200":
          description: Pricing context payload
        "401":
          description: Unauthorized
        "404":
          description: SKU not found
  /api/v1/listings/{listingId}/price-versions:
    post:
      summary: Publish price version (SDD §10.3)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [explicit_price_mxn]
              properties:
                explicit_price_mxn:
                  type: number
                reason:
                  type: string
      responses:
        "200":
          description: version_id and state
        "422":
          description: Guard rejected
  /api/v1/price-versions/{versionId}:
    get:
      summary: Price version with audit fields (TC-INT-VER-003)
  /api/v1/skus/{skuId}/pricing/simulate:
    post:
      summary: Price simulation without persistence (SDD §10.2)
      parameters:
        - name: skuId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, pricing_mode]
              properties:
                channel:
                  type: string
                  enum: [MERCADO_LIBRE, AMAZON_MX]
                pricing_mode:
                  type: string
                target_margin_pct:
                  type: number
                competitor_price_mxn:
                  type: number
      responses:
        "200":
          description: waterfall, publish_price_mxn, guards
  /api/v1/adjustment-batches:
    get:
      summary: List adjustment batches for tenant
      responses:
        "200":
          description: items array of batches
    post:
      summary: Create adjustment batch (SDD §10.4)
      responses:
        "201":
          description: Batch created
  /api/v1/adjustment-batches/export:
    get:
      summary: Download adjustment batch index as CSV
  /api/v1/adjustment-batches/{batchId}/approve:
    post:
      summary: Approve batch pending approval
  /api/v1/adjustment-batches/{batchId}/apply:
    post:
      summary: Apply batch and publish versions
  /api/v1/channels/sandbox/status:
    get:
      summary: Channel sandbox mode (mock write-back)
  /api/v1/channels/adapters/status:
    get:
      summary: Channel publish/pull adapter driver (mock vs http_stub)
  /api/v1/skus/{skuId}/cross-channel-guard:
    get:
      summary: Cross-channel active price spread guard (P5-01)
  /api/v1/reports/pricing-snapshot:
    get:
      summary: Pricing snapshot export (JSON or CSV)
  /api/v1/reports/pricing-snapshots/export:
    get:
      summary: Download all SKU pricing snapshot rows for tenant as CSV
  /api/v1/reports/reconciliation-alerts:
    get:
      summary: Reconciliation alerts export (JSON or CSV)
  /api/v1/auth/status:
    get:
      summary: Auth driver status (dev / oidc_stub)
  /api/v1/feature-flags:
    get:
      summary: Environment feature flags (X-02)
  /api/v1/ops/metrics:
    get:
      summary: Ops metrics snapshot (sandbox, adapters, digest queue)
  /api/v1/ops/metrics/export:
    get:
      summary: Download ops metrics snapshot as CSV
  /api/v1/channels/sandbox/events:
    get:
      summary: Recent sandbox channel events for tenant
  /api/v1/channels/sandbox/events/export:
    get:
      summary: Download sandbox channel events as CSV
  /api/v1/shops:
    get:
      summary: List tenant shops (P1-E1)
      responses:
        "200":
          description: Shop summaries without secrets
    post:
      summary: Create shop record
  /api/v1/shops/export:
    get:
      summary: Download tenant shops as CSV
  /api/v1/shops/{shopId}/oauth/start:
    post:
      summary: Start OAuth placeholder (ML / Amazon LWA)
  /api/v1/shops/{shopId}/oauth/mock-complete:
    post:
      summary: Complete mock OAuth for local dev
  /api/v1/shops/{shopId}/listings/pull:
    post:
      summary: Mock pullListing (TC-INT-CH-001/002)
  /api/v1/listings/{listingId}/competitors:
    get:
      summary: List competitor offers (SDD §10.6)
    post:
      summary: Bind competitor offer to listing
  /api/v1/listings/{listingId}/competitors/export:
    get:
      summary: Download competitor offers with latest prices as CSV
  /api/v1/competitor-offers/{offerId}/observations:
    post:
      summary: Manual price observation (P2-E1-03)
  /api/v1/listings/{listingId}/price-history:
    get:
      summary: Observation history for listing
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [7d, 30d]
  /api/v1/listings/{listingId}/price-history/export:
    get:
      summary: Download price observation history as CSV
  /api/v1/listings/{listingId}/ingest/status:
    get:
      summary: Ingest tier schedule (SDD §8.1)
  /api/v1/listings/{listingId}/ingest/run:
    post:
      summary: Run mock competitor ingest (P2-E2)
  /api/v1/listings/{listingId}/repricing-events/flush:
    post:
      summary: Flush 5min debounce window (SDD §8.4)
  /api/v1/listings/{listingId}/repricing-events:
    get:
      summary: List CompetitorPriceChanged events
  /api/v1/listings/{listingId}/repricing-events/export:
    get:
      summary: Download repricing events as CSV
  /api/v1/repricing-events/{eventId}/process:
    post:
      summary: Process event into suggested version (P2-E3-04)
  /api/v1/listings/{listingId}/dynamic-repricing-rule:
    get:
      summary: Get dynamic repricing rule (SDD §10.5)
    put:
      summary: Upsert dynamic repricing rule
  /api/v1/listings/{listingId}/dynamic-repricing-rule/unfreeze:
    post:
      summary: Unfreeze rule after publish failure (TC-API-GUARD-005)
  /api/v1/listings/{listingId}/competitors/stale-check:
    post:
      summary: Evaluate stale competitor observations (TC-INT-ING-004)
  /api/v1/listings/{listingId}/channel-publish:
    post:
      summary: Publish active price to channel (TC-INT-CH-003/005 mock)
  /api/v1/shops/{shopId}/channel-publish:
    post:
      summary: Publish mapped listing active price (shop scope)
  /api/v1/channel-publish/batch:
    post:
      summary: Batch publish active prices (TC-INT-CH-006 partial success)
  /api/v1/skus/{skuId}/repricing-queue:
    get:
      summary: Suggested and Pending versions for ops center
  /api/v1/repricing-queue/promote-pending:
    post:
      summary: Batch promote Suggested to Pending (TC-E2E-OPS-002)
  /api/v1/repricing-queue/export:
    get:
      summary: Download tenant repricing queue (suggested/pending) as CSV
  /api/v1/skus/{skuId}/repricing-batch/shard-plan:
    get:
      summary: Plan repricing batch shards per SKU listing (P5-05)
  /api/v1/skus/{skuId}/repricing-batch/recompute:
    post:
      summary: Process pending repricing events for one shard (P5-05)
  /api/v1/skus/{skuId}/repricing-batch/recompute-all:
    post:
      summary: Run all shards for one SKU (P5-05 Loop 45)
  /api/v1/repricing-batch/recompute-all:
    post:
      summary: Run all shards for tenant SKUs (P5-05 Loop 45)
  /api/v1/repricing-batch/jobs/enqueue:
    post:
      summary: Enqueue repricing batch job (P5-05 Loop 48)
  /api/v1/repricing-batch/jobs:
    get:
      summary: List repricing batch jobs
  /api/v1/repricing-batch/jobs/{jobId}:
    get:
      summary: Get repricing batch job by id
  /api/v1/repricing-batch/jobs/process:
    post:
      summary: Process queued repricing batch jobs
  /api/v1/category-rule-templates:
    get:
      summary: List category repricing rule templates (P5-02)
  /api/v1/category-rule-templates/export:
    get:
      summary: Download category rule templates as CSV
  /api/v1/category-rule-templates/{categoryId}:
    get:
      summary: Get category rule template by id
  /api/v1/skus/{skuId}/category-rule-template:
    get:
      summary: Resolve category template for SKU
  /api/v1/tenants/{tenantId}/shared-fee-templates:
    get:
      summary: Shared fee templates per tenant (P5-04)
  /api/v1/shared-fee-templates/export:
    get:
      summary: Download shared fee templates for tenant as CSV
  /api/v1/skus/{skuId}/apply-shared-fee-template:
    post:
      summary: Apply shared fee template to SKU channel fees (P5-04)
  /api/v1/reconciliation-alerts:
    get:
      summary: Open channel vs active price alerts (TC-INT-RECON-001)
  /api/v1/reconciliation-alerts/export:
    get:
      summary: Download reconciliation alerts as CSV
  /api/v1/listings/{listingId}/reconcile:
    post:
      summary: Compare active version to channel pull price
  /api/v1/agent/tools:
    get:
      summary: Agent tool catalog (TC-NFR-SEC-004)
  /api/v1/agent/tools/export:
    get:
      summary: Download agent tool catalog as CSV
  /api/v1/agent/tools/invoke:
    post:
      summary: Invoke agent tool with audit (TC-INT-AGENT-001/004)
  /api/v1/agent/tool-audit:
    get:
      summary: Recent agent tool invocations per tenant
  /api/v1/agent/tool-audit/export:
    get:
      summary: Download agent tool audit log as CSV
  /api/v1/rule-compiler/status:
    get:
      summary: Rule compiler driver and LLM adapter readiness (P4)
  /api/v1/agent/digest/daily:
    get:
      summary: Daily Agent digest placeholder (P4-E1-07)
  /api/v1/agent/digest/daily/export:
    get:
      summary: Download daily agent digest as CSV (P4-E1-07)
  /api/v1/agent/digest/run-due:
    post:
      summary: Dispatch daily digest when schedule enabled (P4-E1-07)
  /api/v1/agent/digest/schedule:
    get:
      summary: Digest cron schedule config (stub)
    put:
      summary: Update digest schedule (stub)
  /api/v1/agent/digest/daily/dispatch:
    post:
      summary: Run digest and email_stub delivery (P4-E1-07)
  /api/v1/agent/digest/dispatches:
    get:
      summary: Recent digest dispatch jobs
  /api/v1/agent/digest/dispatches/export:
    get:
      summary: Download digest dispatch history as CSV
  /api/v1/cross-channel/dashboard:
    get:
      summary: Cross-channel spread dashboard per SKU (P3-E3-04)
  /api/v1/cross-channel/dashboard/export:
    get:
      summary: Download cross-channel dashboard as CSV
  /api/v1/skus/{skuId}/cost-sheets/export:
    get:
      summary: Download cost sheet rows for SKU as CSV
  /api/v1/repricing-batch/jobs/summary:
    get:
      summary: Repricing batch job queue summary by status
  /api/v1/repricing-batch/jobs/export:
    get:
      summary: Download repricing batch jobs as CSV
  /api/v1/imports/landed-cost:
    post:
      summary: Import SKU landed costs from CSV (P0-E5-03)
  /api/v1/fx-rates:
    get:
      summary: Tenant FX rate table (P0-E2-03)
  /api/v1/fx-rates/export:
    get:
      summary: Download FX rate table as CSV
  /api/v1/fx-rates/{base}/{quote}:
    put:
      summary: Upsert FX rate row
  /api/v1/skus/{skuId}/landed-cost/from-fx:
    post:
      summary: Compute landed cost from COGS + FX (TC-UNIT-COST-001)
  /api/v1/tariff-hs-rates:
    get:
      summary: Tenant HS tariff table (P0-E2-04)
  /api/v1/tariff-hs-rates/export:
    get:
      summary: Download HS tariff table as CSV
  /api/v1/tariff-hs-rates/{hsCode}:
    put:
      summary: Upsert HS tariff row
  /api/v1/skus/{skuId}/landed-cost/from-hs:
    post:
      summary: Compute landed cost from COGS + HS duty (TC-UNIT-COST-002)
  /api/v1/adjustment-batches/preview:
    post:
      summary: Preview adjustment batch without persisting (P0-E5-04)
  /api/v1/imports/adjustment-prices/template:
    get:
      summary: CSV template for bulk adjustment prices (P0-E5-03)
  /api/v1/imports/adjustment-prices:
    post:
      summary: Parse adjustment CSV and return batch preview
  /api/v1/skus/{skuId}/cost-sheets:
    get:
      summary: List cost sheets for SKU (P0-E2-02)
    post:
      summary: Create cost sheet batch row
  /api/v1/skus/{skuId}/landed-cost/from-cost-sheet:
    post:
      summary: Landed cost from cost sheet + FX/HS (P0-E2-05)
  /api/v1/skus/{skuId}/policy:
    patch:
      summary: Update SKU pricing policy margins (P0-E6-08)
  /api/v1/skus/policy/batch:
    post:
      summary: Batch update SKU pricing policies (P0-E6-08)
  /api/v1/skus/{skuId}/waterfall/export:
    get:
      summary: Export pricing waterfall as CSV (P0-E5-03)
  /api/v1/imports/cost-sheets/template:
    get:
      summary: CSV template for bulk cost sheets
  /api/v1/imports/cost-sheets:
    post:
      summary: Import cost sheet rows from CSV
  /api/v1/listings/{listingId}/sync:
    post:
      summary: Manual listing channel sync with job log (P1-E2-04)
  /api/v1/listings/{listingId}/sync/jobs:
    get:
      summary: Recent listing sync jobs for listing
  /api/v1/ops/listing-sync/schedule:
    get:
      summary: Listing channel sync cron config (P1-E2-04 stub)
    put:
      summary: Update listing sync schedule
  /api/v1/ops/listing-sync/run-due:
    post:
      summary: Run scheduled listing sync for all demo listings when enabled (P1-E2-04)
  /api/v1/ops/listing-sync/jobs:
    get:
      summary: Recent listing sync jobs for tenant (P1-E2-04)
  /api/v1/ops/listing-sync/jobs/export:
    get:
      summary: Download listing sync jobs as CSV (P1-E2-04)
  /api/v1/ops/listing-sync/status:
    get:
      summary: Listing sync schedule plus recent job summary (P1-E2-04)
  /api/v1/ops/listing-sync/status/export:
    get:
      summary: Download listing sync ops status as CSV
  /api/v1/listings/{listingId}/competitors/curve/export:
    get:
      summary: Download competitor price curve as CSV (P2-E1-03)
  /api/v1/adjustment-batches/{batchId}/export:
    get:
      summary: Download adjustment batch as CSV (P0-E5-04)
  /api/v1/listings/{listingId}/competitors/curve:
    get:
      summary: Daily competitor effective price curve (P2-E1-03)
  /api/v1/exports:
    post:
      summary: Create signed export artifact (P0-E1-06)
  /api/v1/exports/{exportId}:
    get:
      summary: Download export with token query param
  /api/v1/adjustment-batches/approval-policy:
    get:
      summary: Adjustment approval thresholds (P0-E5-02)
  /api/v1/ops/version-backup/validate:
    post:
      summary: Validate version backup JSON (X-05 drill)
  /api/v1/ops/version-backup:
    get:
      summary: Tenant price version backup snapshot (X-05)
  /api/v1/ops/workers/status:
    get:
      summary: Async worker heartbeats (P0-E1-05)
  /api/v1/ops/workers/status/export:
    get:
      summary: Download worker heartbeats as CSV
  /api/v1/ops/workers/heartbeat:
    post:
      summary: Worker liveness heartbeat
  /api/v1/product/readiness:
    get:
      summary: P3 + P4 + P5 readiness and milestone acceptance summary
  /api/v1/agent/milestones:
    get:
      summary: P3/P4 milestone status (P4 accepted when readiness passes)
  /api/v1/agent/readiness:
    get:
      summary: P4 milestone acceptance checks (SEC-004, AGENT APIs)
  /api/v1/agent/digest/daily/enqueue:
    post:
      summary: Enqueue digest job for async worker
  /api/v1/agent/digest/jobs:
    get:
      summary: List queued digest jobs
  /api/v1/agent/digest/jobs/summary:
    get:
      summary: Digest job queue summary with sampled jobs
  /api/v1/agent/digest/jobs/export:
    get:
      summary: Download digest queued jobs as CSV
  /api/v1/agent/digest/jobs/process:
    post:
      summary: Process queued digest jobs
  /api/v1/agent/digest/jobs/dead-letter/summary:
    get:
      summary: Digest dead-letter queue summary with sampled jobs
  /api/v1/agent/digest/jobs/dead-letter/export:
    get:
      summary: Download digest dead-letter jobs as CSV
  /api/v1/agent/digest/jobs/dead-letter:
    get:
      summary: Digest jobs moved to dead-letter queue (TC-NFR-REL-004) (email_stub / webhook_queue)
  /api/v1/agent/copilot/sessions:
    post:
      summary: Start Copilot multi-turn session (SDD §12)
  /api/v1/agent/copilot/sessions/{sessionId}:
    get:
      summary: Copilot session transcript
  /api/v1/agent/copilot/sessions/{sessionId}/messages:
    post:
      summary: User turn — clarification or NL rule compile draft
  /api/v1/listings/{listingId}/dynamic-repricing-rule/compile:
    post:
      summary: NL to DynamicRuleDraft without persist (TC-E2E-AGENT-003)
  /api/v1/listings/{listingId}/dynamic-repricing-rule/confirm-compiled:
    post:
      summary: Persist compiled rule draft after user confirm
