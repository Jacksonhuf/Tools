name: ci-unit-engine

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  unit-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:golden
      - run: npm run test:api
